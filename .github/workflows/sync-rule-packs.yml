name: Sync Stable Rule Packs

on:
  schedule:
    - cron: "11 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-stable-rule-packs
  cancel-in-progress: true

jobs:
  update-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve and hash latest Stable packs
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/update-rule-packs.py
      - name: Open reviewed lock update PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- rules/packs.lock; then
            echo 'Already current or no Stable packs published'
            exit 0
          fi
          branch="automation/sync-rule-packs-${GITHUB_RUN_ID}"
          git config user.name 'bashlume-rules-bot'
          git config user.email 'bashlume-rules-bot@users.noreply.github.com'
          git switch -c "$branch"
          git add rules/packs.lock
          git commit -m 'chore: update pinned Stable rule packs'
          git push --set-upstream origin "$branch"
          gh pr create --base main --head "$branch" \
            --title 'chore: update pinned Stable rule packs' \
            --body 'Automated version, URL, and SHA-256 lock update. Core compatibility, signature, provenance, integration, and resource checks must pass before merge.'
